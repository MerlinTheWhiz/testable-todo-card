<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Todo Card</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <article
      class="todo-card"
      data-testid="test-todo-card"
      aria-labelledby="todo-title"
    >
      <div class="card-container" data-testid="test-todo-view-mode">
        <div class="card-header">
          <div class="left">
            <input
              type="checkbox"
              id="complete"
              data-testid="test-todo-complete-toggle"
              aria-label="Mark task complete"
            />
          </div>

          <div class="title-wrap">
            <h2 id="todo-title" data-testid="test-todo-title">
              Finish Internship Task
            </h2>
          </div>

          <span class="priority priority-high" data-testid="test-todo-priority">
            <span class="priority-indicator" data-testid="test-todo-priority-indicator"></span>
            HIGH
          </span>
        </div>
        <div>
          <p class="desc" data-testid="test-todo-description">
            Build a testable todo card using vanilla JS, HTML, and CSS with the
            exact data-testid values for automated tests.
          </p>
        </div>
        <div class="meta">
          <div class="meta-item">
            <div class="meta-label">Due date</div>
            <time
              class="due-date"
              data-testid="test-todo-due-date"
              datetime="2026-04-16T18:00:00Z"
            >
              <svg
                xmlns="http://www.w3.org/2000/svg"
                fill="none"
                viewBox="0 0 24 24"
                stroke-width="1.5"
                stroke="currentColor"
                class="calendar-icon"
              >
                <path
                  stroke-linecap="round"
                  stroke-linejoin="round"
                  d="M6.75 3v2.25M17.25 3v2.25M3 18.75V7.5a2.25 2.25 0 0 1 2.25-2.25h13.5A2.25 2.25 0 0 1 21 7.5v11.25m-18 0A2.25 2.25 0 0 0 5.25 21h13.5A2.25 2.25 0 0 0 21 18.75m-18 0v-7.5A2.25 2.25 0 0 1 5.25 9h13.5A2.25 2.25 0 0 1 21 11.25v7.5"
                />
              </svg>
              <span>April 16, 2026</span>
            </time>
          </div>

          <div class="meta-item">
            <div class="meta-label">Status</div>
            <div class="status-row">
              <div data-testid="test-todo-status">In Progress</div>

              <select data-testid="test-todo-status-control">
                <option>Pending</option>
                <option>In Progress</option>
                <option>Done</option>
              </select>
            </div>
          </div>
        </div>

        <div
          class="time-remaining"
          data-testid="test-todo-time-remaining"
          aria-live="polite"
        >
          <svg
            xmlns="http://www.w3.org/2000/svg"
            fill="none"
            viewBox="0 0 24 24"
            stroke-width="1.5"
            stroke="currentColor"
            class="clock-icon"
          >
            <path
              stroke-linecap="round"
              stroke-linejoin="round"
              d="M12 6v6h4.5m4.5 0a9 9 0 1 1-18 0 9 9 0 0 1 18 0Z"
            />
          </svg>
          <span></span>
        </div>

        <ul class="tags" data-testid="test-todo-tags" aria-label="Tags">
          <li data-testid="test-todo-tag-work">Work</li>
          <li data-testid="test-todo-tag-urgent">Urgent</li>
          <li data-testid="test-todo-tag-design">Design</li>
        </ul>

        <div class="actions">
          <button
            class="btn btn-edit"
            data-testid="test-todo-edit-button"
            aria-label="Edit task"
          >
            <svg
              xmlns="http://www.w3.org/2000/svg"
              fill="none"
              viewBox="0 0 24 24"
              stroke-width="1.5"
              stroke="currentColor"
              class="edit-icon"
            >
              <path
                stroke-linecap="round"
                stroke-linejoin="round"
                d="m16.862 4.487 1.687-1.688a1.875 1.875 0 1 1 2.652 2.652L10.582 16.07a4.5 4.5 0 0 1-1.897 1.13L6 18l.8-2.685a4.5 4.5 0 0 1 1.13-1.897l8.932-8.931Zm0 0L19.5 7.125M18 14v4.75A2.25 2.25 0 0 1 15.75 21H5.25A2.25 2.25 0 0 1 3 18.75V8.25A2.25 2.25 0 0 1 5.25 6H10"
              />
            </svg>
            <span>Edit Task</span>
          </button>

          <button
            class="btn btn-delete"
            data-testid="test-todo-delete-button"
            aria-label="Delete task"
          >
            <svg
              xmlns="http://www.w3.org/2000/svg"
              fill="none"
              viewBox="0 0 24 24"
              stroke-width="1.5"
              stroke="currentColor"
              class="delete-icon"
            >
              <path
                stroke-linecap="round"
                stroke-linejoin="round"
                d="m14.74 9-.346 9m-4.788 0L9.26 9m9.968-3.21c.342.052.682.107 1.022.166m-1.022-.165L18.16 19.673a2.25 2.25 0 0 1-2.244 2.077H8.084a2.25 2.25 0 0 1-2.244-2.077L4.772 5.79m14.456 0a48.108 48.108 0 0 0-3.478-.397m-12 .562c.34-.059.68-.114 1.022-.165m0 0a48.11 48.11 0 0 1 3.478-.397m7.5 0v-.916c0-1.18-.91-2.164-2.09-2.201a51.964 51.964 0 0 0-3.32 0c-1.18.037-2.09 1.022-2.09 2.201v.916m7.5 0a48.667 48.667 0 0 0-7.5 0"
              />
            </svg>
            <span>Delete Task</span>
          </button>
        </div>
      </div>

      <div data-testid="test-todo-edit-form" hidden>
        <label>
          Title
          <input data-testid="test-todo-edit-title-input" />
        </label>

        <label>
          Description
          <textarea data-testid="test-todo-edit-description-input"></textarea>
        </label>

        <label>
          Priority
          <select data-testid="test-todo-edit-priority-select">
            <option>Low</option>
            <option>Medium</option>
            <option>High</option>
          </select>
        </label>

        <label>
          Due Date
          <input
            type="datetime-local"
            data-testid="test-todo-edit-due-date-input"
          />
        </label>

        <button data-testid="test-todo-save-button">Save</button>
        <button data-testid="test-todo-cancel-button">Cancel</button>
      </div>
    </article>

    <script src="script.js"></script>
  </body>
</html>
